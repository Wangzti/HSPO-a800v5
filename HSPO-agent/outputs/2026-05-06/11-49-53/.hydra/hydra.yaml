    - actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=32
    - actor_rollout_ref.rollout.tensor_model_parallel_size=1
    - actor_rollout_ref.rollout.name=vllm
    - actor_rollout_ref.rollout.gpu_memory_utilization=0.72
    - actor_rollout_ref.rollout.max_num_seqs=80
    - actor_rollout_ref.rollout.enable_chunked_prefill=False
    - actor_rollout_ref.rollout.enforce_eager=True
    - actor_rollout_ref.rollout.free_cache_engine=True
    - actor_rollout_ref.rollout.val_kwargs.temperature=0.4
    - actor_rollout_ref.rollout.val_kwargs.do_sample=True
    - actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=32
    - actor_rollout_ref.ref.fsdp_config.param_offload=True
    - actor_rollout_ref.actor.use_invalid_action_penalty=False
    - algorithm.use_kl_in_reward=True
    - algorithm.kl_coef=0.01
    - algorithm.hspo.abg_min_group_size=2
    - algorithm.hspo.abg_target_size=4
    - algorithm.hspo.abg_max_branch=4
    - algorithm.hspo.abg_step_cost=-0.1
    - algorithm.hspo.abg_completion_bonus=2.0
    - algorithm.hspo.low_clip_epsilon=0.2
    - algorithm.hspo.low_beta=0.01
    - algorithm.hspo.high_gamma=0.99
    - algorithm.hspo.high_lam=0.95
    - algorithm.hspo.high_clip_epsilon=0.2
    - algorithm.hspo.high_beta=0.01
    - algorithm.hspo.switch_alpha=0.5
    - algorithm.hspo.alpha_t=0.5
    - algorithm.hspo.alpha_l=1.0
    - algorithm.hspo.alpha_h=1.0
    - algorithm.hspo.alpha_sft=0.1
    - algorithm.hspo.norm_adv=True
    - algorithm.hspo.warmup_epochs=10
    - algorithm.hspo.executor_epochs=100
    - env.env_name=alfworld/AlfredTWEnvOptions
    - env.seed=0
    - env.max_steps=50
    - env.rollout.n=4
    - env.resources_per_worker.num_cpus=0.25
    - trainer.critic_warmup=0
    - trainer.logger=['console','wandb']
    - trainer.project_name=verl_agent_alfworld
    - trainer.experiment_name=hspo_qwen2.5_1.5b
    - trainer.n_gpus_per_node=1
    - trainer.nnodes=1
    - trainer.save_freq=25
    - trainer.test_freq=5
    - trainer.total_epochs=200
    - trainer.val_before_train=False
    - trainer.default_local_dir=/root/autodl-tmp/checkpoints/verl_agent_alfworld/hspo_qwen2.5_1.5b
    - trainer.max_actor_ckpt_to_keep=2
    - trainer.max_critic_ckpt_to_keep=2
    - ray_init.num_cpus=16
    - +ray_init._temp_dir=/root/autodl-tmp/ray_tmp
  job:
    name: main_hspo
    chdir: null
    override_dirname: +data.dataloader_num_workers=0,+ray_init._temp_dir=/root/autodl-tmp/ray_tmp,actor_rollout_ref.actor.fsdp_config.optimizer_offload=False,actor_rollout_ref.actor.fsdp_config.param_offload=False,actor_rollout_ref.actor.optim.lr=1e-6,actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=32,actor_rollout_ref.actor.ppo_mini_batch_size=256,actor_rollout_ref.actor.use_invalid_action_penalty=False,actor_rollout_ref.actor.use_kl_loss=False,actor_rollout_ref.model.enable_gradient_checkpointing=True,actor_rollout_ref.model.path=/root/autodl-tmp/models/Qwen2.5-1.5B-Instruct,actor_rollout_ref.model.use_remove_padding=True,actor_rollout_ref.ref.fsdp_config.param_offload=True,actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=32,actor_rollout_ref.rollout.enable_chunked_prefill=False,actor_rollout_ref.rollout.enforce_eager=True,actor_rollout_ref.rollout.free_cache_engine=True,actor_rollout_ref.rollout.gpu_memory_utilization=0.72,actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=32,actor_rollout_ref.rollout.max_num_seqs=80,actor_rollout_ref.rollout.name=vllm,actor_rollout_ref.rollout.tensor_model_parallel_size=1,actor_rollout_ref.rollout.val_kwargs.do_sample=True,actor_rollout_ref.rollout.val_kwargs.temperature=0.4,algorithm.hspo.abg_completion_bonus=2.0,algorithm.hspo.abg_max_branch=4,algorithm.hspo.abg_min_group_size=2,algorithm.hspo.abg_step_cost=-0.1,algorithm.hspo.abg_target_size=4,algorithm.hspo.alpha_h=1.0,algorithm.hspo.alpha_l=1.0,algorithm.hspo.alpha_sft=0.1,algorithm.hspo.alpha_t=0.5,algorithm.hspo.executor_epochs=100,algorithm.hspo.high_beta=0.01,algorithm.hspo.high_clip_epsilon=0.2,algorithm.hspo.high_gamma=0.99,algorithm.hspo.high_lam=0.95,algorithm.hspo.low_beta=0.01,algorithm.hspo.low_clip_epsilon=0.2,algorithm.hspo.norm_adv=True,algorithm.hspo.switch_alpha=0.5,algorithm.hspo.warmup_epochs=10,algorithm.kl_coef=0.01,algorithm.use_kl_in_reward=True,data.filter_overlong_prompts=True,data.max_prompt_length=2048,data.max_response_length=