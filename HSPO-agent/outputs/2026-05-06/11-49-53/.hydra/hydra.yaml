    id: ???
    num: ???
    config_name: hspo_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /root/projects/HSPO/HSPO-agent
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /root/projects/HSPO/HSPO-agent/recipe/hspo/config
      schema: file
      provider: main
    - path: verl/trainer/config
      schema: file
      provider: hydra.searchpath in main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /root/projects/HSPO/HSPO-agent/outputs/2026-05-06/11-49-53
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
