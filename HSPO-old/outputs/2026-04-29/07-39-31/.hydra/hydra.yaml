hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - data.train_files=/mnt/nfs/ztwang/data/hspo/sft/alfworld_sft/train_format.parquet
    - data.val_files=/mnt/nfs/ztwang/data/hspo/sft/alfworld_sft/val_format.parquet
    - data.train_batch_size=64
    - data.micro_batch_size_per_gpu=2
    - data.max_length=12288
    - data.truncation=right
    - data.multiturn.enable=true
    - data.multiturn.messages_key=messages
    - model.partial_pretrain=/mnt/nfs/ztwang/models/Qwen2.5-1.5B-Instruct
    - +model.torch_dtype=bfloat16
    - model.enable_gradient_checkpointing=true
    - model.fsdp_config.cpu_offload=false
    - model.trust_remote_code=false
    - ulysses_sequence_parallel_size=1
    - +actor_rollout_ref.model.override_config.attn_implementation=flash_attention_2
    - optim.lr=2e-5
    - optim.warmup_steps_ratio=0.05
    - optim.clip_grad=1.0
    - trainer.total_epochs=2
    - trainer.default_local_dir=/mnt/nfs/ztwang/checkpoints/hspo/sft/alfworld_qwen2.5_1.5b_instruct_step1_format
    - trainer.project_name=hspo_sft
    - trainer.experiment_name=alfworld_format_qwen2.5_1.5b
    - trainer.logger=[console]
    - trainer.seed=42
  job:
    name: fsdp_sft_trainer
    chdir: null
    override_dirname: +actor_rollout_ref.model.override_config.attn_implementation=flash_attention_2,+model.torch_dtype=bfloat16,data.max_length=12288,data.micro_batch_size_per_gpu=2,data.multiturn.enable=true,data.multiturn.messages_key=messages,data.train_batch_size=64,data.train_files=/mnt/nfs/ztwang/data/hspo/sft/alfworld_sft/train_format.parquet,data.truncation=right,data.val_files=/mnt/nfs/ztwang/data/hspo/sft/alfworld_sft/val_format.parquet,model.enable_gradient_checkpointing=true,model.fsdp_config.cpu_offload=false,model.partial_pretrain=/mnt/nfs/ztwang/models/Qwen2.5-1.5B-Instruct,model.trust_remote_code=false,optim.clip_grad=1.0,optim.lr=2e-5,optim.warmup_steps_ratio=0.05,trainer.default_local_dir=/mnt/nfs/ztwang/checkpoints/hspo/sft/alfworld_qwen2.5_1.5b_instruct_step1_format,trainer.experiment_name=alfworld_format_qwen2.5_1.5b,trainer.logger=[console],trainer.project_name=hspo_sft,trainer.seed=42,trainer.total_epochs=2,ulysses_sequence_parallel_size=1
    id: ???
    num: ???
    config_name: sft_trainer
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /mnt/nfs/ztwang/projects/demos/HSPO/HSPO-agent
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /mnt/nfs/ztwang/projects/demos/HSPO/HiPER-agent/verl/trainer/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /mnt/nfs/ztwang/projects/demos/HSPO/HSPO-agent/outputs/2026-04-29/07-39-31
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
